<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog Website</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CUSTOM CSS -->
    <style>
        body{
            background-color: #f8f9fa;
        }

        .article-image{
            height: 220px;
            object-fit: cover;
        }

        .card{
            transition: 0.3s;
            border-radius: 14px;
            overflow: hidden;
        }

        .card:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .nav-btn{
            border-radius: 10px;
            padding: 8px 16px;
        }

        .article-title{
            min-height: 55px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .article-content{
            line-height: 1.9;
            font-size: 17px;
        }

        .news-card{
            background: white;
            border-radius: 16px;
            transition: 0.3s;
        }

        .news-card:hover{
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .news-image{
            width: 170px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .news-title{
            font-size: 28px;
            font-weight: 700;

            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .category-text{
            font-size: 14px;
            font-weight: 600;
            color: #6c757d;
        }

        .news-content{
            font-size: 17px;
            line-height: 1.7;

            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        footer{
            margin-top: auto;
        }
    </style>

</head>

<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="/">
            📰 MyBlog
        </a>

        <!-- MENU -->
        <div class="d-flex gap-2">

            <!-- ADMIN -->
            {% if user.is_authenticated and user.is_superuser %}

                <a href="/dashboard"
                   class="btn btn-success nav-btn">
                    Dashboard
                </a>

                <a href="/logout"
                   class="btn btn-secondary nav-btn">
                    Logout
                </a>

            {% endif %}
        </div>
    </div>
</nav>

<!-- CONTENT -->
<main class="container mt-4 mb-5 flex-grow-1">
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">
        2026 MyBlog - Django Blog App
    </p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
